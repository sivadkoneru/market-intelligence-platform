# docker-compose.yml — Market Intelligence Platform: infra + application services
# Druid: the official apache/druid image entrypoint (/druid.sh) runs exactly ONE
# Druid service per container, named by `command:` — there is no all-in-one mode
# (the tarball bin/start-*-quickstart scripts need perl/python that the image
# does not ship). So Druid runs as the standard split: coordinator (with the
# overlord embedded via asOverlord), broker, historical, middleManager, router.
# All share PostgreSQL metadata + ZooKeeper (see x-druid-common and
# infra/druid/environment); DRUID_SINGLE_NODE_CONF=micro-quickstart keeps each
# node's heap small for local dev. Only the router publishes the 8888 console.
# AZURE_PRODUCTION.md covers the production multi-node sizing.

x-druid-common: &druid-common
  platform: linux/amd64
  image: apache/druid:37.0.0
  # The image runs as the non-root `druid` user (uid 1000), but Docker creates
  # the named-volume mountpoints below (and their parent /opt/druid/var/druid)
  # as root, so the entrypoint cannot create var/druid/{task,segment-cache,…}.
  # Running these dev containers as root sidesteps the volume-ownership friction;
  # production uses managed Druid (see AZURE_PRODUCTION.md), not this compose.
  user: "0:0"
  env_file:
    - ./infra/druid/environment
  depends_on:
    postgres:
      condition: service_healthy
    zookeeper:
      condition: service_healthy
  networks:
    - mip-net
  restart: unless-stopped
  mem_limit: 2g                  # ~512m heap + 512m direct per node; raise if OOM
  # The router fails to start with only 1 CPU — it sizes internal thread pools from
  # Runtime.availableProcessors(), which yields 0 workers at 1 CPU and aborts before
  # logging (exit 1). Keep this >= 2.
  cpus: 2

x-app-common: &app-common
  networks:
    - mip-net
  # Lets containers reach a model server running on the host (e.g. Ollama,
  # vLLM, LM Studio) via http://host.docker.internal:<port>. Automatic on
  # Docker Desktop; this mapping also makes it resolve on Linux.
  extra_hosts:
    - "host.docker.internal:host-gateway"
  restart: unless-stopped

networks:
  mip-net:
    driver: bridge

volumes:
  postgres-data:
  # Druid local deep storage + indexing logs are shared across the data/ingest/
  # query nodes (see the Druid services below). With druid.storage.type=local the
  # historical must read the segments the middleManager wrote, so these dirs
  # cannot be per-container.
  druid-segments:
  druid-indexer-logs:
  es-data:

services:
  # ---------------------------------------------------------------------------
  # SQL Server — required backing store for the Azure Service Bus emulator
  # ---------------------------------------------------------------------------
  mssql:
    # Azure SQL Edge is the Service Bus emulator's documented backing store and
    # ships a native arm64 image, so it runs without QEMU on Apple Silicon. The
    # full mcr.microsoft.com/mssql/server image is amd64-only and segfaults under
    # emulation on arm64 Macs. SQL Edge is multi-arch, so amd64/CI hosts work too.
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: mip-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-Str0ng!Passw0rd}"
    ports:
      - "1433:1433"
    networks:
      - mip-net
    restart: unless-stopped
    healthcheck:
      # SQL Edge does not ship sqlcmd/mssql-tools, so probe the TCP port via
      # bash /dev/tcp. The Service Bus emulator retries its own SQL connection,
      # so port-open readiness is sufficient to gate startup here.
      test: ["CMD-SHELL", "timeout 1 bash -c '</dev/tcp/localhost/1433' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Azure Service Bus Emulator
  # Config JSON defines the namespace, 5 topics, and all subscriptions.
  # Mount path inside container: /ServiceBus_Emulator/ConfigFiles/Config.json
  # ---------------------------------------------------------------------------
  servicebus-emulator:
    image: mcr.microsoft.com/azure-messaging/servicebus-emulator:latest
    container_name: mip-servicebus
    environment:
      ACCEPT_EULA: "Y"
      SQL_SERVER: mssql
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-Str0ng!Passw0rd}"
      EMULATOR_HTTP_PORT: "5300"
    volumes:
      - ./infra/servicebus-config.json:/ServiceBus_Emulator/ConfigFiles/Config.json:ro
    ports:
      - "5672:5672"   # AMQP
      - "5300:5300"   # HTTP management / health
    depends_on:
      mssql:
        condition: service_healthy
    networks:
      - mip-net
    restart: unless-stopped
    # No healthcheck: the emulator image is distroless (no shell, curl, or other
    # probe binary), so any in-container healthcheck command fails to exec.
    # Dependents use `condition: service_started`; the emulator opens AMQP 5672
    # within a few seconds, and the app services retry the bus connection
    # (tenacity + CircuitBreaker) until topics are ready.

  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — app relational metadata + Druid metadata store
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16
    container_name: mip-postgres
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-mip}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-mip_local}"
      POSTGRES_DB: "${POSTGRES_DB:-mip}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - mip-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mip} -d ${POSTGRES_DB:-mip}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ---------------------------------------------------------------------------
  # ZooKeeper 3.8 — Druid coordination
  # ---------------------------------------------------------------------------
  zookeeper:
    image: zookeeper:3.8
    container_name: mip-zookeeper
    environment:
      ZOO_MY_ID: "1"
      ZOO_SERVERS: "server.1=zookeeper:2888:3888;2181"
      # The image enables only `srvr` in the four-letter-word allowlist by
      # default; the healthcheck below uses `ruok`, so it must be whitelisted.
      ZOO_4LW_COMMANDS_WHITELIST: "srvr,ruok"
    ports:
      - "2181:2181"
    networks:
      - mip-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc -w 2 localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Apache Druid 37.0.0 — per-service single-node topology (see header comment).
  # All five services share the apache/druid image + infra/druid/environment via
  # the x-druid-common anchor; each sets only its own `command:`, port, volumes,
  # and healthcheck. The image ships wget (not curl), so /status/health is probed
  # with wget. coordinator runs the overlord in-process (asOverlord, set in the
  # micro-quickstart config), so no separate overlord container is needed.
  # ---------------------------------------------------------------------------
  druid-coordinator:
    <<: *druid-common
    container_name: mip-druid-coordinator
    command: ["coordinator"]
    volumes:
      - druid-indexer-logs:/opt/druid/var/druid/indexing-logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8081/status/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 20
      start_period: 120s

  druid-broker:
    <<: *druid-common
    container_name: mip-druid-broker
    command: ["broker"]
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8082/status/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 20
      start_period: 120s

  druid-historical:
    <<: *druid-common
    container_name: mip-druid-historical
    command: ["historical"]
    volumes:
      - druid-segments:/opt/druid/var/druid/segments
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8083/status/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 20
      start_period: 120s

  druid-middlemanager:
    <<: *druid-common
    container_name: mip-druid-middlemanager
    command: ["middleManager"]
    volumes:
      - druid-segments:/opt/druid/var/druid/segments
      - druid-indexer-logs:/opt/druid/var/druid/indexing-logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8091/status/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 20
      start_period: 120s

  druid-router:
    <<: *druid-common
    container_name: mip-druid-router
    command: ["router"]
    ports:
      - "8888:8888"   # Router / console + SQL/HTTP API
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8888/status/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 20
      start_period: 120s

  # ---------------------------------------------------------------------------
  # Redis 7 — caching, latest-value snapshots, idempotency keys
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7
    container_name: mip-redis
    ports:
      - "6379:6379"
    networks:
      - mip-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Elasticsearch 8.17.0 — structured log store + RAG vector search (kNN)
  # Security disabled for local dev. mem_limit note: ES needs >= 1 GB heap.
  # ---------------------------------------------------------------------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: mip-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - mip-net
    restart: unless-stopped
    # mem_limit: 1500m  # Uncomment to cap ES memory on resource-constrained hosts
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Grafana 11.3.0 — dashboards over Elasticsearch / PostgreSQL / Druid
  # Provisioning dir is mounted; datasources/dashboards added in T17.
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.3.0
    container_name: mip-grafana
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_PLUGINS_PREINSTALL: "marcusolsson-json-datasource@1.3.24"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      elasticsearch:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - mip-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  ingestion:
    <<: *app-common
    build:
      context: .
      dockerfile: services/ingestion/Dockerfile
    container_name: mip-ingestion
    environment:
      SERVICE_NAME: ingestion
      SERVICE_BUS_CONNECTION_STRING: "Endpoint=sb://servicebus-emulator;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=SAS_KEY_VALUE;UseDevelopmentEmulator=true;"
      REDIS_URL: "redis://redis:6379/0"
      DRUID_URL: "http://druid-router:8888"
      ELASTICSEARCH_URL: "http://elasticsearch:9200"
      POSTGRES_DSN: "postgresql+asyncpg://${POSTGRES_USER:-mip}:${POSTGRES_PASSWORD:-mip_local}@postgres:5432/${POSTGRES_DB:-mip}"
      MOCK_LLM: "${MOCK_LLM:-1}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      NEW_RELIC_LICENSE_KEY: "${NEW_RELIC_LICENSE_KEY:-}"
      NEW_RELIC_CONFIG_FILE: "${NEW_RELIC_CONFIG_FILE:-}"
      NEW_RELIC_APP_NAME: "${NEW_RELIC_APP_NAME:-}"
      NEW_RELIC_ENVIRONMENT: "${NEW_RELIC_ENVIRONMENT:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-}"
      OPENAI_CHAT_MODEL: "${OPENAI_CHAT_MODEL:-gpt-4o-mini}"
      OPENAI_EMBEDDING_MODEL: "${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}"
    ports:
      - "8001:8001"
    depends_on:
      servicebus-emulator:
        condition: service_started
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health')"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  stream:
    <<: *app-common
    build:
      context: .
      dockerfile: services/stream/Dockerfile
    container_name: mip-stream
    environment:
      SERVICE_NAME: stream
      SERVICE_BUS_CONNECTION_STRING: "Endpoint=sb://servicebus-emulator;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=SAS_KEY_VALUE;UseDevelopmentEmulator=true;"
      REDIS_URL: "redis://redis:6379/0"
      DRUID_URL: "http://druid-router:8888"
      ELASTICSEARCH_URL: "http://elasticsearch:9200"
      POSTGRES_DSN: "postgresql+asyncpg://${POSTGRES_USER:-mip}:${POSTGRES_PASSWORD:-mip_local}@postgres:5432/${POSTGRES_DB:-mip}"
      MOCK_LLM: "${MOCK_LLM:-1}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      NEW_RELIC_LICENSE_KEY: "${NEW_RELIC_LICENSE_KEY:-}"
      NEW_RELIC_CONFIG_FILE: "${NEW_RELIC_CONFIG_FILE:-}"
      NEW_RELIC_APP_NAME: "${NEW_RELIC_APP_NAME:-}"
      NEW_RELIC_ENVIRONMENT: "${NEW_RELIC_ENVIRONMENT:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-}"
      OPENAI_CHAT_MODEL: "${OPENAI_CHAT_MODEL:-gpt-4o-mini}"
      OPENAI_EMBEDDING_MODEL: "${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}"
    ports:
      - "8002:8002"
    depends_on:
      servicebus-emulator:
        condition: service_started
      redis:
        condition: service_healthy
      druid-router:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/health')"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  ai-analysis:
    <<: *app-common
    build:
      context: .
      dockerfile: services/ai/Dockerfile
    container_name: mip-ai-analysis
    environment:
      SERVICE_NAME: ai-analysis
      SERVICE_BUS_CONNECTION_STRING: "Endpoint=sb://servicebus-emulator;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=SAS_KEY_VALUE;UseDevelopmentEmulator=true;"
      REDIS_URL: "redis://redis:6379/0"
      DRUID_URL: "http://druid-router:8888"
      ELASTICSEARCH_URL: "http://elasticsearch:9200"
      POSTGRES_DSN: "postgresql+asyncpg://${POSTGRES_USER:-mip}:${POSTGRES_PASSWORD:-mip_local}@postgres:5432/${POSTGRES_DB:-mip}"
      MOCK_LLM: "${MOCK_LLM:-1}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      NEW_RELIC_LICENSE_KEY: "${NEW_RELIC_LICENSE_KEY:-}"
      NEW_RELIC_CONFIG_FILE: "${NEW_RELIC_CONFIG_FILE:-}"
      NEW_RELIC_APP_NAME: "${NEW_RELIC_APP_NAME:-}"
      NEW_RELIC_ENVIRONMENT: "${NEW_RELIC_ENVIRONMENT:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-}"
      OPENAI_CHAT_MODEL: "${OPENAI_CHAT_MODEL:-gpt-4o-mini}"
      OPENAI_EMBEDDING_MODEL: "${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}"
    ports:
      - "8003:8003"
    depends_on:
      servicebus-emulator:
        condition: service_started
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8003/health')"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  alerting:
    <<: *app-common
    build:
      context: .
      dockerfile: services/alerting/Dockerfile
    container_name: mip-alerting
    environment:
      SERVICE_NAME: alerting
      SERVICE_BUS_CONNECTION_STRING: "Endpoint=sb://servicebus-emulator;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=SAS_KEY_VALUE;UseDevelopmentEmulator=true;"
      REDIS_URL: "redis://redis:6379/0"
      DRUID_URL: "http://druid-router:8888"
      ELASTICSEARCH_URL: "http://elasticsearch:9200"
      POSTGRES_DSN: "postgresql+asyncpg://${POSTGRES_USER:-mip}:${POSTGRES_PASSWORD:-mip_local}@postgres:5432/${POSTGRES_DB:-mip}"
      MOCK_LLM: "${MOCK_LLM:-1}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      NEW_RELIC_LICENSE_KEY: "${NEW_RELIC_LICENSE_KEY:-}"
      NEW_RELIC_CONFIG_FILE: "${NEW_RELIC_CONFIG_FILE:-}"
      NEW_RELIC_APP_NAME: "${NEW_RELIC_APP_NAME:-}"
      NEW_RELIC_ENVIRONMENT: "${NEW_RELIC_ENVIRONMENT:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-}"
      OPENAI_CHAT_MODEL: "${OPENAI_CHAT_MODEL:-gpt-4o-mini}"
      OPENAI_EMBEDDING_MODEL: "${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}"
    ports:
      - "8004:8004"
    depends_on:
      servicebus-emulator:
        condition: service_started
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8004/health')"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  api:
    <<: *app-common
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: mip-api
    environment:
      SERVICE_NAME: api
      SERVICE_BUS_CONNECTION_STRING: "Endpoint=sb://servicebus-emulator;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=SAS_KEY_VALUE;UseDevelopmentEmulator=true;"
      REDIS_URL: "redis://redis:6379/0"
      DRUID_URL: "http://druid-router:8888"
      ELASTICSEARCH_URL: "http://elasticsearch:9200"
      POSTGRES_DSN: "postgresql+asyncpg://${POSTGRES_USER:-mip}:${POSTGRES_PASSWORD:-mip_local}@postgres:5432/${POSTGRES_DB:-mip}"
      MOCK_LLM: "${MOCK_LLM:-1}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      NEW_RELIC_LICENSE_KEY: "${NEW_RELIC_LICENSE_KEY:-}"
      NEW_RELIC_CONFIG_FILE: "${NEW_RELIC_CONFIG_FILE:-}"
      NEW_RELIC_APP_NAME: "${NEW_RELIC_APP_NAME:-}"
      NEW_RELIC_ENVIRONMENT: "${NEW_RELIC_ENVIRONMENT:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-}"
      OPENAI_CHAT_MODEL: "${OPENAI_CHAT_MODEL:-gpt-4o-mini}"
      OPENAI_EMBEDDING_MODEL: "${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}"
    ports:
      - "8000:8005"
    depends_on:
      servicebus-emulator:
        condition: service_started
      redis:
        condition: service_healthy
      druid-router:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8005/health')"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s
